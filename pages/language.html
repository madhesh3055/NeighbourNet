<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Language</title>

<link rel="stylesheet" href="../css/language.css">
</head>

<body>

<div class="container">

<img src="../assets/logos/logo.png" class="logo">

<h1>Select Language</h1>

<p>Choose your preferred language</p>

<div class="languages">

<div class="card" onclick="selectLanguage('English')">
English
</div>

<div class="card" onclick="selectLanguage('Tamil')">
தமிழ்
</div>

<div class="card" onclick="selectLanguage('Hindi')">
हिन्दी
</div>

<div class="card" onclick="selectLanguage('Telugu')">
తెలుగు
</div>

<div class="card" onclick="selectLanguage('Malayalam')">
മലയാളം
</div>

</div>

<button onclick="continueApp()">
Continue
</button>

</div>

<script src="../js/language.js"></script>

</body>
</html>
