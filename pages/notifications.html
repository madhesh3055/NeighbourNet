<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Notifications</title>

<link rel="stylesheet"
href="../css/notifications.css">

</head>

<body>

<header>

<h1>🔔 Notifications</h1>

</header>

<div class="notification-card">

<h3>🏢 Apartment Notice</h3>

<p>
Water supply maintenance
tomorrow from 9 AM to 12 PM.
</p>

<span>10 mins ago</span>

</div>

<div class="notification-card">

<h3>🎉 Event Update</h3>

<p>
Cricket Tournament starts this
Saturday at 8 AM.
</p>

<span>1 hour ago</span>

</div>

<div class="notification-card">

<h3>🤝 Help Request</h3>

<p>
A resident needs a Maths Tutor.
</p>

<span>2 hours ago</span>

</div>

<div class="notification-card">

<h3>🛒 Marketplace</h3>

<p>
New Laptop added for sale.
</p>

<span>5 hours ago</span>

</div>

<script src="../js/notifications.js"></script>

</body>

</html>
